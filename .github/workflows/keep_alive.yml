name: Keep Render Alive 🚀

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:  # Manual trigger option

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Bot
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.RENDER_URL }})
          echo "Ping status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: Bot returned status $STATUS"
          else
            echo "✅ Bot is alive!"
          fi
